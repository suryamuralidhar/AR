<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR 360 Viewer</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

#viewer{
width:100vw;
height:100vh;
}

#arBtn{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:14px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
cursor:pointer;
z-index:10;
}

</style>

</head>

<body>

<div id="viewer"></div>

<button id="arBtn">ENTER AR</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/DeviceOrientationControls.js"></script>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
